# Nixpacks config for Railway
# Ensures Python and build tools are available for better-sqlite3's native addon

[phases.setup]
nixPkgs = ["python3", "gcc", "gnumake", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "node scripts/start.js"
